<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    background: #0A0A0A;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .bars {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .bar {
    width: 12px;
    background: #FFF;
    border-radius: 6px;
    animation: eq 1s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) { height: 40px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 80px; animation-delay: 0.2s; }
  .bar:nth-child(3) { height: 120px; animation-delay: 0.4s; }
  .bar:nth-child(4) { height: 60px; animation-delay: 0.6s; }
  .bar:nth-child(5) { height: 90px; animation-delay: 0.8s; }
  
  @keyframes eq {
    0% { transform: scaleY(0.3); opacity: 0.5; }
    100% { transform: scaleY(1); opacity: 1; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
  }
</style>
</head>
<body>
  <div class="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</body>
</html>
