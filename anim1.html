<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    background: #0A0A0A;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .radar {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 2px solid #333;
    position: relative;
  }
  .radar::before {
    content: '';
    position: absolute;
    width: 50%;
    height: 50%;
    bottom: 50%;
    right: 50%;
    transform-origin: bottom right;
    background: linear-gradient(45deg, transparent 50%, rgba(255, 255, 255, 0.8) 100%);
    animation: scan 2s linear infinite;
    border-radius: 100% 0 0 0;
  }
  .radar::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    background: #FFF;
    border-radius: 50%;
    box-shadow: 0 0 20px #FFF;
  }
  .dot {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #FFF;
    border-radius: 50%;
    top: 30%;
    left: 60%;
    opacity: 0;
    animation: blink 2s linear infinite;
  }
  @keyframes scan {
    to { transform: rotate(360deg); }
  }
  @keyframes blink {
    0%, 10% { opacity: 0; }
    15% { opacity: 1; box-shadow: 0 0 10px #FFF; }
    30%, 100% { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="radar"><div class="dot"></div></div>
</body>
</html>
